<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>giffgaff 关闭语音信箱｜鱼哥 giffgaff</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <a class="seller" href="./index.html">
          <img src="./assets/avatar.jpg" alt="" width="42" height="42">
          <span>返回首页</span>
        </a>
      </header>
      <section class="hero-card">
        <p class="kicker">Voicemail</p>
        <h1>关闭语音信箱</h1>
        <p class="hero-text">人在英国以外时，建议联系 giffgaff 客服手动关闭语音信箱，避免拒接电话后可能产生漫游扣费。</p>
      </section>
      <section class="benefits tutorial-steps">
        <article>
          <span>1</span>
          <h2>打开 Ask an Agent 页面</h2>
          <p><a href="https://support2.giffgaff.com/app/ask/International-and-Roaming/Accessing-voicemail-while-abroad/form/" target="_blank" rel="noopener">进入 giffgaff 客服表单</a>，登录你的 giffgaff 账户后继续。</p>
        </article>
        <article>
          <span>2</span>
          <h2>发送关闭请求</h2>
          <p>可以把下面这段英文发给客服，点击英文可复制：</p>
          <button class="copy-text" type="button" data-copy="Hello, I am outside the UK. Please fully disable voicemail on my giffgaff account to avoid roaming charges, as I cannot turn it off myself from abroad. Thank you.">Hello, I am outside the UK. Please fully disable voicemail on my giffgaff account to avoid roaming charges, as I cannot turn it off myself from abroad. Thank you.</button>
          <p class="copy-tip" aria-live="polite"></p>
        </article>
        <article>
          <span>3</span>
          <h2>等待邮件确认</h2>
          <p>提交后等待客服处理，通常 24 小时内会通过邮件确认。</p>
        </article>
        <article>
          <span>参考</span>
          <h2>原帖说明</h2>
          <p><a href="https://x.com/0xFunX/status/2061062981992243585" target="_blank" rel="noopener">查看 X 原帖</a></p>
        </article>
      </section>
    </main>
    <script>
      const copyButton = document.querySelector(".copy-text");
      const copyTip = document.querySelector(".copy-tip");

      copyButton.addEventListener("click", async () => {
        await navigator.clipboard.writeText(copyButton.dataset.copy);
        copyTip.textContent = "已复制，可以粘贴给客服。";
        setTimeout(() => {
          copyTip.textContent = "";
        }, 2200);
      });
    </script>
  </body>
</html>
